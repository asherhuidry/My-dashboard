name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (syntax errors only)
        run: |
          pip install flake8
          # Fail on syntax errors and undefined names, but skip F821
          # (forward reference type hints that are valid in Python 3.11+)
          flake8 . --count --select=E9,F63,F7,F82 --ignore=F821 --show-source --statistics

      - name: Run tests
        run: python -m pytest tests/ -x -q --tb=short

name: Weekly Market Graph Pipeline

on:
  schedule:
    # Saturday 8 AM ET — full weekly pipeline
    - cron: '0 13 * * 6'
  workflow_dispatch:
    inputs:
      skip_ingest:
        description: 'Skip data ingestion (run discovery only)'
        required: false
        default: false
        type: boolean

env:
  SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
  FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
  NEO4J_URI:       ${{ secrets.NEO4J_URI }}
  NEO4J_USER:      ${{ secrets.NEO4J_USER }}
  NEO4J_PASSWORD:  ${{ secrets.NEO4J_PASSWORD }}

jobs:
  # ── Job 1: FRED macro data (65 series → Supabase) ─────────────────────────
  macro-ingest:
    name: "FRED Macro — 65 Series"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event.inputs.skip_ingest != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run FRED macro ingest
        run: |
          python -c "
          from data.ingest.macro_expanded import run
          result = run(start_date='2005-01-01', store=True)
          print(f'Macro ingest: {result[\"series_fetched\"]} series, '
                f'{result[\"total_observations\"]} observations')
          "

  # ── Job 2: ECB macro data (Euro area — no auth) ───────────────────────────
  ecb-ingest:
    name: "ECB — Euro Area Macro"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.inputs.skip_ingest != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ECB ingest
        run: |
          python -c "
          from data.ingest.ecb_connector import run
          results = run(start_period='2020-01-01')
          ok = [r for r in results if r.error is None]
          total = sum(r.rows_fetched for r in ok)
          print(f'ECB ingest: {len(ok)}/{len(results)} series OK, {total} observations')
          "

  # ── Job 3: Discovery → Persist → Graph Materialize ────────────────────────
  #
  # This is the core pipeline. correlation_hunter.run() does:
  #   1. Fetch price returns via yfinance (no pre-ingest needed)
  #   2. Fetch FRED macro levels
  #   3. Compute Pearson + Granger + mutual info for all pairs
  #   4. Persist discoveries to Supabase
  #   5. Auto-materialize the full market graph in Neo4j
  #
  # The graph compounds every time this runs.
  #
  discovery-pipeline:
    name: "Discovery → Persist → Graph"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [macro-ingest, ecb-ingest]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full discovery pipeline
        run: |
          python -X utf8 -c "
          from data.agents.correlation_hunter import run

          # run() uses the full universe (60 assets + 20 FRED macro series)
          # and automatically: discover → persist to Supabase → materialize Neo4j graph
          findings = run()

          strong   = sum(1 for f in findings if f.strength == 'strong')
          moderate = sum(1 for f in findings if f.strength == 'moderate')
          granger  = sum(1 for f in findings if f.granger_p and f.granger_p < 0.05)

          print(f'Discovery pipeline complete:')
          print(f'  Total findings:    {len(findings)}')
          print(f'  Strong:            {strong}')
          print(f'  Moderate:          {moderate}')
          print(f'  Granger-causal:    {granger}')
          print(f'  (graph auto-materialized in Neo4j)')

          for f in sorted(findings, key=lambda x: abs(x.pearson_r), reverse=True)[:10]:
              print(f'  {f.series_a:12s} <-> {f.series_b:12s}  r={f.pearson_r:+.3f}  lag={f.lag_days:+3d}d  [{f.strength}]')
          "

  # ── Summary ────────────────────────────────────────────────────────────────
  pipeline-summary:
    name: "Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [macro-ingest, ecb-ingest, discovery-pipeline]
    if: always()
    steps:
      - name: Report
        run: |
          echo "=== Weekly Market Graph Pipeline ==="
          echo "FRED macro ingest:    ${{ needs.macro-ingest.result }}"
          echo "ECB macro ingest:     ${{ needs.ecb-ingest.result }}"
          echo "Discovery + Graph:    ${{ needs.discovery-pipeline.result }}"
